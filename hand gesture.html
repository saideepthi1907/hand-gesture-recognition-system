<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Gesture Recognition</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eef0f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:700px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    font-size:55px;
    color:#2d2d2d;
    margin-bottom:15px;
}

.subtitle{
    text-align:center;
    font-size:28px;
    color:#666;
    font-weight:bold;
    margin-bottom:40px;
}

.upload-section{
    text-align:center;
}

input[type="file"]{
    margin-bottom:25px;
}

button{
    background:#0d84ff;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#006be0;
}

.result{
    margin-top:35px;
    background:#eef0ff;
    padding:20px;
    border-radius:10px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:green;
}

.gesture-list{
    margin-top:40px;
}

.gesture-list h3{
    color:#555;
    font-size:28px;
    margin-bottom:20px;
}

.gesture-list ul{
    padding-left:25px;
}

.gesture-list li{
    margin-bottom:15px;
    font-size:20px;
    color:#444;
}
</style>
</head>

<body>

<div class="container">

    <h1>Hand Gesture Recognition</h1>

    <div class="subtitle">
        Human-Computer Interaction System
    </div>

    <div class="upload-section">

        <input type="file" id="imageInput">

        <br>

        <button onclick="recognizeGesture()">
            Recognize Gesture
        </button>

    </div>

    <div class="result" id="result">
        Detected Gesture: 👍 Thumbs Up
    </div>

    <div class="gesture-list">
        <h3>Supported Gestures</h3>

        <ul>
            <li>👍 Thumbs Up</li>
            <li>👎 Thumbs Down</li>
            <li>✌ Victory Sign</li>
            <li>🖐 Open Palm</li>
            <li>✊ Fist</li>
        </ul>
    </div>

</div>

<script>
function recognizeGesture(){

    const gestures = [
        "👍 Thumbs Up",
        "👎 Thumbs Down",
        "✌ Victory Sign",
        "🖐 Open Palm",
        "✊ Fist"
    ];

    const randomGesture =
        gestures[Math.floor(Math.random()*gestures.length)];

    document.getElementById("result").innerHTML =
        "Detected Gesture: " + randomGesture;
}
</script>

</body>
</html>
